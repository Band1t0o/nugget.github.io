  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nclick=\"{{ odhlasit }}\" style=\"background:none;border:none;color:#9fb39b;font-size:12px;font-weight:700;cursor:pointer;text-decoration:underline;padding:0\">odhlásit<\u002Fbutton>\n<\u002Fdiv>\n<sc-if value=\"{{ dirty }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"display:flex;gap:8px;align-items:flex-start;margin-top:10px\">\n<span style=\"flex:none;width:9px;height:9px;border-radius:50%;background:#f0b429;margin-top:5px\"><\u002Fspan>\n<span style=\"font-size:12.5px;color:#f6d99a;line-height:1.45\">Máš změny, které ostatní ještě nevidí. Ulož je na web.<\u002Fspan>\n<\u002Fdiv>\n<\u002Fsc-if>\n<sc-if value=\"{{ cisto }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"display:flex;gap:8px;align-items:flex-start;margin-top:10px\">\n<span style=\"flex:none;width:9px;height:9px;border-radius:50%;background:#8aa872;margin-top:5px\"><\u002Fspan>\n<span style=\"font-size:12.5px;color:#cdd8c9;line-height:1.45\">Termíny, nástěnka, vybavení, fotky i video jsou sladěné s webem.<\u002Fspan>\n<\u002Fdiv>\n<\u002Fsc-if>\n<button onclick=\"{{ pushGithub }}\" style=\"width:100%;margin-top:12px;background:#d63c2f;color:#f8f3e8;border:none;border-radius:999px;font-family:'Baloo 2',cursive;font-weight:700;font-size:14.5px;padding:11px 0;cursor:pointer\">{{ pushLabel }}<\u002Fbutton>\n<sc-if value=\"{{ ghOk }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"margin-top:9px;font-size:12px;color:#bfe0c4;line-height:1.5\">{{ ghMsg }}<\u002Fdiv>\n<\u002Fsc-if>\n<sc-if value=\"{{ ghErr }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"margin-top:9px;font-size:12px;color:#f4b8b1;line-height:1.5\">{{ ghMsg }}<\u002Fdiv>\n<\u002Fsc-if>\n<button onclick=\"{{ toggleGh }}\" style=\"margin-top:11px;background:none;border:none;color:#9fb39b;font-size:12px;font-weight:700;cursor:pointer;padding:0;text-decoration:underline\">Nastavení GitHubu<\u002Fbutton>\n<sc-if value=\"{{ ghOpen }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"margin-top:11px;display:flex;flex-direction:column;gap:8px\">\n<input placeholder=\"vlastnik/nazev-repa\" value=\"{{ ghRepo }}\" onchange=\"{{ zmenGhRepo }}\" style=\"border:1.5px solid #526b57;border-radius:8px;padding:8px 10px;font-family:Nunito,sans-serif;font-size:12.5px;background:#2b3d33;color:#f8f3e8;box-sizing:border-box;width:100%\">\n<input placeholder=\"větev (main)\" value=\"{{ ghBranch }}\" onchange=\"{{ zmenGhBranch }}\" style=\"border:1.5px solid #526b57;border-radius:8px;padding:8px 10px;font-family:Nunito,sans-serif;font-size:12.5px;background:#2b3d33;color:#f8f3e8;box-sizing:border-box;width:100%\">\n<input type=\"password\" placeholder=\"GitHub token\" value=\"{{ ghToken }}\" onchange=\"{{ zmenGhToken }}\" style=\"border:1.5px solid #526b57;border-radius:8px;padding:8px 10px;font-family:Nunito,sans-serif;font-size:12.5px;background:#2b3d33;color:#f8f3e8;box-sizing:border-box;width:100%\">\n<span style=\"font-size:11px;color:#9fb39b;line-height:1.5\">Token zůstává jen v tomhle prohlížeči, nikam se necommitne. Vytvoř si fine-grained token s právem <strong style=\"font-family:Nunito,sans-serif;color:#cdd8c9\">Contents: Read and write<\u002Fstrong> pro tenhle repozitář.<\u002Fspan>\n<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;scrollReveal&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Chování&quot;,&quot;description&quot;:&quot;Nuggeta odsviští i při scrollu (ne jen po kliknutí)&quot;},&quot;adminHeslo&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Ivan&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Kalendář&quot;,&quot;description&quot;:&quot;Tajné slovo pro režim posádky (úpravy kalendáře)&quot;},&quot;githubRepo&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;GitHub& et i = 0; i < 3; i++) {\n      const m0 = dnes.getMonth() + i;\n      const y = dnes.getFullYear() + Math.floor(m0 / 12);\n      const m = m0 % 12;\n      const pad = (new Date(y, m, 1).getDay() + 6) % 7;\n      const dnu = new Date(y, m + 1, 0).getDate();\n      const dny = [];\n      for (let p = 0; p < pad; p++) dny.push({ t: '', bg: 'transparent', fg: 'transparent' });\n      for (let d = 1; d <= dnu; d++) {\n        const key = y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');\n        const busy = t.some(r => key >= r.od && key <= r.do);\n        const minule = key < dnesKey;\n        dny.push({\n          t: String(d),\n          bg: minule ? '#eee7d8' : busy ? '#d63c2f' : '#dfe9d2',\n          fg: minule ? '#b3a78f' : busy ? '#f8f3e8' : '#4f6b48',\n        });\n      }\n      out.push({ nazev: NAZVY[m] + ' ' + y, dny });\n    }\n    return out;\n  }\n\n  rozsah(x) {\n    const a = x.od.split('-').map(Number);\n    const b = x['do'].split('-').map(Number);\n    return a[1] === b[1]\n      ? a[2] + '.–' + b[2] + '. ' + a[1] + '.'\n      : a[2] + '. ' + a[1] + '. – ' + b[2] + '. ' + b[1] + '.';\n  }\n\n  renderVals() {\n    const ph = this.state.phase;\n    const r = this.state.runs;\n    const mes = this.mesice3();\n    const delays = [0, 0.1, 0.2, 0.32, 0.45, 0.58, 0.72, 0.88];\n    return {\n      jeGone: ph === 'gone',\n      jeIdle: ph === 'idle',\n      svist: this.svist,\n      zpatky: this.zpatky,\n      vanAnim: ph === 'idle'\n        ? 'ng-idle 3.4s ease-in-out infinite'\n        : ph === 'gone'\n          ? 'ng-drive 1.9s cubic-bezier(.5,0,.85,.55) forwards'\n          : 'ng-arrive 1.7s cubic-bezier(.25,.7,.3,1) forwards',\n      wheelAnim: ph === 'idle' ? 'none' : 'ng-spin ' + (1.8 + r * 0.001) + 's cubic-bezier(.5,.1,.8,.6) 1',\n      prach: delays.map((d, i) => ({\n        x: -190 + (i % 4) * 105 + (i > 3 ? 50 : 0),\n        vel: 22 + (i % 3) * 13,\n        anim: ph === 'idle' ? 'none' : 'ng-puff ' + (1.1 + (i % 3) * 0.28) + 's ease-out ' + (d + r * 0.001) + 's forwards',\n      })),\n      heroMesic: mes[0],\n      mesice: mes,\n      terminyList: this.terminy().map((x, i) => ({ kdy: this.rozsah(x), kdo: x.kdo, smaz: () => this.smaz(i) })),\n      jeAdmin: this.state.admin,\n      neniAdmin: !this.state.admin,\n      ptameSe: this.state.ptameSe,\n      neptameSe: !this.state.ptameSe,\n      pin: this.state.pin,\n      pinChyba: this.state.pinChyba,\n      zmenPin: this.zmenPin,\n      pinEnter: this.pinEnter,\n      prihlasit: this.prihlasit,\n      chciSpravovat: this.chciSpravovat,\n      odhlasit: this.odhlasit,\n      dirty: this.state.dirty || this.state.fotoDirty || this.state.videoDirty,\n      cisto: !(this.state.dirty || this.state.fotoDirty || this.state.videoDirty),\n      ghOpen: this.state.ghOpen,\n      toggleGh: this.toggleGh,\n      ghToken: this.state.ghToken,\n      ghRepo: this.state.ghRepo,\n      ghBranch: this.state.ghBranch,\n      zmenGhToken: this.zmenGhToken,\n      zmenGhRepo: this.zmenGhRepo,\n      zmenGhBranch: this.zmenGhBranch,\n      pushGithub: this.pushGithub,\n      ghOk: this.state.ghStatus === 'ok',\n      ghErr: this.state.ghStatus === 'err',\n      ghMsg: this.state.ghMsg,\n      pushLabel: this.state.ghStatus === 'push' ? 'Ukládám…' : 'Uložit na web',\n      zmenOd: this.zmenOd,\n      zmenDo: this.zmenDo,\n      zmenKdo: this.zmenKdo,\n      novyOd: this.state.novyOd,\n      novyDo: this.state.novyDo,\n      novyKdo: this.state.novyKdo,\n      pridej: this.pridej,\n      poznamkyList: this.poznamky().map((t, i) => ({ text: t, rot: [-2, 1.5, -1, 2][i % 4], smaz: () => this.smazPoznamku(i) })),\n      novaPoznamka: this.state.novaPoznamka,\n      zmenPoznamku: this.zmenPoznamku,\n      poznamkaEnter: this.poznamkaEnter,\n      pridejPoznamku: this.pridejPoznamku,\n      vybavaList: this.vybava().map((v, i) => ({ ikona: v.ikona || 'krabice', nazev: v.nazev, text: v.text, smaz: () => this.smazVybavu(i) })),\n      vybIkona: this.state.vybIkona,\n      vybNazev: this.state.vybNazev,\n      vybText: this.state.vybText,\n      zmenVybIkona: this.zmenVybIkona,\n      zmenVybNazev: this.zmenVybNazev,\n      zmenVybText: this.zmenVybText,\n      vybEnter: this.vybEnter,\n      pridejVybavu: this.pridejVybavu,\n      fotky: this.FOTKY.map((f) => {\n        const loc = this.state.fotoLoc[f.n];\n        const del = this.state.fotoDel[f.n];\n        const u = this.state.fotoUrl[f.n];\n        const disp = loc ? loc.url : (del ? null : (typeof u === 'string' ? u : null));\n        return {\n          cap: f.cap,\n          bg: disp ? 'url(\"' + disp + '\")' : 'none',\n          ma: !!disp,\n          nema: !disp,\n          nahrajLabel: disp ? 'Změnit' : 'Nahrát fotku',\n          nahraj: () => this.nahrajFotoClick(f.n),\n          smaz: () => this.smazFoto(f.n),\n        };\n      }),\n      fotoInputRef: this.fotoInput,\n      nahrajFoto: this.nahrajFoto,\n      jeYoutube: !!this.state.youtube,\n      youtubeSrc: this.state.youtube ? ('https://www.youtube-nocookie.com/embed/' + this.state.youtube) : '',\n      youtubeInput: this.state.youtubeInput,\n      zmenYoutubeInput: this.zmenYoutubeInput,\n      youtubeEnter: this.youtubeEnter,\n      ulozYoutube: this.ulozYoutube,\n      smazYoutube: this.smazYoutube,\n      maVideo: !!(!this.state.youtube && (this.state.videoUrl || (this.state.videoSoubor && !this.state.videoDel))),\n      nemaVideo: !(this.state.youtube || this.state.videoUrl || (this.state.videoSoubor && !this.state.videoDel)),\n      jeNahled: !!this.state.videoDirty,\n      videoSrc: this.state.videoUrl || this.VIDEO_FILE,\n      videoElRef: this.videoElRef,\n      videoInputRef: this.videoInput,\n      vyberVideo: this.vyberVideo,\n      nahrajVideo: this.nahrajVideo,\n      smazVideo: this.smazVideo,\n      videoCas: this.videoCas,\n      videoStart: this.videoStart,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
